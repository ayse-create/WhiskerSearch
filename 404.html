<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>404</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:'Patrick Hand', cursive;
  background:#d9d9d9;
}

/* PATİ DESENİ */
.paws{
  position:fixed;
  inset:0;
  background-image:url("https://upload.wikimedia.org/wikipedia/commons/3/3f/Paw_print.svg");
  background-repeat:repeat;
  background-size:100px;
  opacity:0.2;
}

/* ORTADA TEMİZ ALAN */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:460px;
  padding:40px;
  background:#d9d9d9;
  text-align:center;
}

h1{
  font-size:120px;
  margin:0;
}

p{
  font-size:26px;
  line-height:1.4;
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#333;
  color:white;
  font-family:'Patrick Hand', cursive;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="paws"></div>

<div class="center">
  <h1>404</h1>
  <p>
    Belki bu sayfa patilerin arasında kaybolmuştur…<br>
    Belki de hiç var olmamıştır…
  </p>

  <button onclick="window.location.href='/WhiskerSearch/'">
    Ana sayfaya dön
  </button>
</div>

</body>
</html>
