    .address-bar {

      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s;

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }

      background: white;
      border-radius: 12px;

      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

    @keyframes slideUp {
      from {

        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .alert-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: wobble 0.6s;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }

    .result-title {

 <body>
  <div class="browser-container">
   <!-- Demo Uyarısı -->
   <div class="demo-warning">

      <button class="nav-button" onclick="goBack()" title="Geri">←</button>

    <div class="address-bar">

  <script>
    // -------- DEĞİŞKENLER --------
    let lastSearchQuery = '';
    let canvaLink = 'https://www.canva.com/design/DAGrke6nXUY/OdOciaHr0CxE1haEmn-IeA/view?utm_content=DAGrke6nXUY&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h31ec2b4051';
    let currentTab = 'all';
    let history = [];
    let historyIndex = -1;

    // İzin verilen kendi sitelerin
    const ownSites = [
      'ayse-create.github.io',
      'professorcatsearch.com',
      'whiskersearch.com'
    ];

    // -------- ADRES ÇUBUĞU --------
    function handleAddress(event) {
      if (event.key === 'Enter') {
        const input = document.getElementById('addressInput');
        let url = input.value.trim();
        if (!url) return;

        // http:// veya https:// yoksa ekle
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }

        // Kendi sitem mi?
        const isOwn = ownSites.some(site => url.includes(site));

        if (isOwn) {
          loadPage(url);
        } else {
          window.open(url, '_blank', 'noopener,noreferrer');
        }
      }
    }

    // -------- SAYFA YÜKLE (iframe) --------
    function loadPage(url) {
      const content = document.getElementById('browserContent');
      content.innerHTML = `
        <iframe class="page-frame" src="${url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      `;
      document.getElementById('addressInput').value = url;

      // Geçmişe ekle
      history.push({ type: 'page', url: url });
      historyIndex = history.length - 1;
    }

    // -------- ANA SAYFA --------
    function goHome() {
      const content = document.getElementById('browserContent');
      content.innerHTML = `
        <div class="search-page">
          <div class="search-logo">🐱</div>
          <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="ProfessorCat'ta ara..." onkeypress="handleSearch(event)" />
            <button class="search-button" onclick="performSearch()">Ara</button>
          </div>
        </div>
      `;
      document.getElementById('addressInput').value = 'https://www.professorcatsearch.com';
      // Geçmişi sıfırlama
      history = [];
      historyIndex = -1;
    }

    // -------- GERİ --------
    function goBack() {
      if (historyIndex > 0) {
        historyIndex--;
        const entry = history[historyIndex];
        if (entry.type === 'results') {
          lastSearchQuery = entry.query;
          showResults();
        } else if (entry.type === 'page') {
          loadPage(entry.url);
        }
      }
    }

    // -------- İLERİ --------
    function goForward() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        const entry = history[historyIndex];
        if (entry.type === 'results') {
          lastSearchQuery = entry.query;
          showResults();
        } else if (entry.type === 'page') {
          loadPage(entry.url);
        }
      }
    }

    // -------- ARAMA --------
    function handleSearch(event) {
      if (event.key === 'Enter') {
        performSearch();
      }
    }

    function performSearch() {
      const query = document.getElementById('searchInput').value;
      if (query.trim()) {
        lastSearchQuery = query;
        document.getElementById('addressInput').value = `https://professorcatsearch.com/search?q=${encodeURIComponent(query)}`;
        showAlert();
      }
    }

    function showAlert() {
      document.getElementById('alertOverlay').style.display = 'flex';
    }

    function confirmAlert() {
      document.getElementById('alertOverlay').style.display = 'none';
      showResults();
    }

    // -------- SONUÇLARI GÖSTER --------
    function showResults() {
      const content = document.getElementById('browserContent');
      const query = lastSearchQuery;

      content.innerHTML = `
        <div style="display: flex; align-items: center; padding: 20px 30px; background: #f9f9f9; border-bottom: 1px solid #e0e0e0;">

            <input type="text" class="search-input" value="${query}" onkeypress="handleSearch(event)" style="max-width: none;" />
            <button class="search-button" onclick="performSearch()">Ara</button>
          </div>
        </div>

        <div class="tabs-container">
          <button class="tab active" onclick="switchTab('all')">🔍 Tümü</button>
          <button class="tab" onclick="switchTab('images')">🖼️ Görseller</button>
          <button class="tab" onclick="switchTab('videos')">🎬 Videolar</button>
          <button class="tab" onclick="switchTab('shopping')">🛍️ Alışveriş</button>
          <button class="tab" onclick="switchTab('ai')">✨ AI Modu</button>
        </div>

        <!-- Tümü -->
        <div id="all-content" class="tab-content active">
          <div class="results-container">
            <div style="margin-bottom: 10px; color: #999; font-size: 14px;">Sonuçlar: "${query}" için</div>
            <div class="result-item" onclick="openResult()">
              <div class="result-content">
                <div class="result-url">professorcatsearch.com › arama › ${query}</div>
                <div class="result-title">ProfessorCat'ın En İyi Sonucu</div>
                <div class="result-description">ProfessorCat sizin için özel olarak seçtiği bu kaynağı incelemenizi tavsiye eder.</div>
              </div>
            </div>
            <div class="result-item" onclick="openResult()">
              <div class="result-content">
                <div class="result-url">professorcatsearch.com › sonuç › ${query}</div>
                <div class="result-title">Başka Bir ProfessorCat Önerisi</div>
                <div class="result-description">ProfessorCat'ın dış dünyaya bakışını sizin de deneyimlemenizi çok isterim.</div>
              </div>
            </div>
            <div class="result-item" onclick="openResult()">
              <div class="result-content">
                <div class="result-url">professorcatsearch.com › tavsiye › ${query}</div>
                <div class="result-title">ProfessorCat'ın Özel Seçimi</div>
                <div class="result-description">Bu bağlantı ProfessorCat tarafından titizlikle incelendi ve onaylandı!</div>
              </div>

          </div>
        </div>

        <!-- Görseller -->

            <div class="image-item" onclick="openResult()">😺</div>

            <div class="product-item" onclick="openResult()"><div class="product-image">😸</div><div class="product-name">Kedi Şapkası</div><div class="product-price">₺149</div></div>
            <div class="product-item" onclick="openResult()"><div class="product-image">😹</div><div class="product-name">Mugs Kedi</div><div class="product-price">₺79</div></div>
            <div class="product-item" onclick="openResult()"><div class="product-image">😻</div><div class="product-name">Kedi Bilezik</div><div class="product-price">₺99</div></div>
            <div class="product-item" onclick="openResult()"><div class="product-image">😼</div><div class="product-name">Kedi Çorap</div><div class="product-price">₺49</div></div>
            <div class="product-item" onclick="openResult()"><div class="product-image">😽</div><div class="product-name">Kedi Hoodie</div><div class="product-price">₺299</div></div>
          </div>
        </div>

        <!-- AI Modu -->
        <div id="ai-content" class="tab-content">
          <div class="ai-chat-container">
            <div class="ai-messages" id="aiMessages">
              <div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 20px;">
                <div style="font-size: 80px;">🤖</div>
                <div style="font-size: 32px; font-weight: 700; color: #333;">CatAI</div>
                <div style="font-size: 16px; color: #666; max-width: 400px; text-align: center;">ProfessorCat'ın yapay zeka asistanı ile sohbet edin. Bir soru sorun ve hazır olun!</div>
              </div>
            </div>
            <div class="ai-input-area">
              <input type="text" class="ai-input" id="aiInput" placeholder="Bir soru sor..." onkeypress="handleAIMessage(event)" />
              <button class="ai-send-button" onclick="sendAIMessage()">Gönder</button>
            </div>
          </div>
        </div>
      `;

      // Geçmişe ekle
      history.push({ type: 'results', query: query });
      historyIndex = history.length - 1;

      // AI input focus
      setTimeout(() => {
        const aiInput = document.getElementById('aiInput');
        if (aiInput) aiInput.focus();
      }, 100);
    }

    // -------- AI MESAJ --------
    function handleAIMessage(event) {
      if (event.key === 'Enter') {
        sendAIMessage();
      }
    }

    async function sendAIMessage() {
      const input = document.getElementById('aiInput');
      const message = input.value.trim();
      if (!message) return;

      const container = document.getElementById('aiMessages');

      // Kullanıcı mesajı
      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.innerHTML = `<div class="message-bubble">${message}</div>`;
      container.appendChild(userDiv);

      input.value = '';

      // AI düşünüyor
      const aiDiv = document.createElement('div');
      aiDiv.className = 'message ai';
      aiDiv.innerHTML = '<div class="message-bubble">CatAI düşünüyor...</div>';
      container.appendChild(aiDiv);
      container.scrollTop = container.scrollHeight;

      try {
        const response = await window.engine.chat.completions.create({
          messages: [
            { role: "system", content: "Sen CatAI adlı Türkçe konuşan yardımcı bir yapay zekasın. Her zaman Türkçe cevap ver." },
            { role: "user", content: message }
          ]
        });
        aiDiv.innerHTML = `<div class="message-bubble">${response.choices[0].message.content}</div>`;
      } catch (err) {
        aiDiv.innerHTML = `<div class="message-bubble">Hata: ${err.message}</div>`;
      }
      container.scrollTop = container.scrollHeight;
    }

    // -------- TAB GEÇİŞ --------
    function switchTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`${tabName}-content`).classList.add('active');
    }

    // -------- SONUÇ AÇ --------
    function openResult() {
      window.open(canvaLink, '_blank', 'noopener,noreferrer');
    }

    // -------- RELOAD (Tarayıcı yenileme butonu) --------
    function reload() {
      if (historyIndex >= 0 && history[historyIndex]) {
        const entry = history[historyIndex];
        if (entry.type === 'results') {
          lastSearchQuery = entry.query;
          showResults();
        } else if (entry.type === 'page') {
          loadPage(entry.url);
        }
      }
    }

    // -------- SAYFA YÜKLENİNCE --------
    window.onload = function() {
      // Adres çubuğuna odaklanma
      const addrInput = document.getElementById('addressInput');
      if (addrInput) addrInput.value = 'https://www.professorcatsearch.com';
    };
  </script>
 </body>
</html>
