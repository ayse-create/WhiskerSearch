<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - ProfessorCat</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f4f6;
  font-family:Arial;
  overflow:hidden;
}

/* KONFETİ ARKA PLAN */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

/* BEYAZ PERDE */
.veil{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.35);
  z-index:2;
}

/* KART */
.card{
  width:420px;
  background:white;
  border-radius:18px;
  padding:30px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  position:relative;
  z-index:3;
}

.icon{
  font-size:42px;
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:24px;
  color:#222;
}

p{
  color:#666;
  font-size:14px;
  line-height:1.5;
  margin:15px 0 25px;
}

.button{
  display:inline-block;
  padding:12px 18px;
  border-radius:12px;
  color:white;
  text-decoration:none;
  font-size:14px;
  font-weight:500;

  background:linear-gradient(135deg,#a5b4fc,#fbcfe8,#c4b5fd);
  transition:0.2s;
}

.button:hover{
  transform:translateY(-2px);
}

.back{
  display:block;
  margin-top:15px;
  font-size:12px;
  color:#777;
  text-decoration:underline;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="veil"></div>

<div class="card">

  <div class="icon">✉️</div>

  <h1>ProfessorCat İletişim</h1>

  <p>
    ProfessorCat evrenini geliştirmemize yardımcı olmak veya
    geri bildirimde bulunmak için bizimle iletişime geçebilirsin.
  </p>

  <a class="button"
     href="mailto:4936b43e103b4b31@teamchat.zoom.us?subject=ProfessorCat%20Feedback">
    İletişim Kur
  </a>

  <a class="back" href="index.html">Ana sayfa</a>

</div>

<script>
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const emojis = ["💜","🩷","🩵"];

let particles = [];

function spawn(){
  for(let i=0;i<6;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: -20,
      speed: Math.random()*2 + 1,
      emoji: emojis[Math.floor(Math.random()*emojis.length)],
      size: Math.random()*20 + 20
    });
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    ctx.font = p.size + "px Arial";
    ctx.fillText(p.emoji, p.x, p.y);

    p.y += p.speed;

    if(p.y > canvas.height){
      particles.splice(i,1);
    }
  });

  requestAnimationFrame(draw);
}

draw();
setInterval(spawn, 300);
</script>

</body>
</html>
