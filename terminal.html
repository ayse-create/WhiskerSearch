<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WhiskerSearch Terminal</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #eaeaea;
  font-family: "SF Mono","Menlo","Monaco","Consolas",monospace;
  font-size: 13px;
  line-height: 1.05;
}

.terminal {
  padding: 12px;
  box-sizing: border-box;
}

.line {
  margin: 0;
  padding: 0;
  white-space: pre-wrap;
}

.cmd {
  color: #ffd54a; /* sarı */
}

a {
  color: #7aa2ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.prompt {
  display: flex;
  gap: 6px;
  align-items: center;
}

.prompt span {
  color: #7CFF7C;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #eaeaea;
  font: inherit;
}
</style>
</head>

<body>

<div class="terminal">

  <div class="line">WhiskerSearch Terminal v1.0</div>

  <div id="output"></div>

  <div class="prompt">
    <span>whiskersearch@system ~ %</span>
    <input id="cmd" autofocus />
  </div>

</div>

<script>
const cmd = document.getElementById("cmd");
const output = document.getElementById("output");

function linkify(text){
  return text.replace(/(https?:\/\/[^\s]+)/g,
    url => `<a href="${url}" target="_blank">${url}</a>`
  );
}

function addLine(text, className = ""){
  const div = document.createElement("div");
  div.className = "line " + className;
  div.innerHTML = linkify(text);
  output.appendChild(div);
}

cmd.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const value = cmd.value.trim();

  // kullanıcı komutu (sarı)
  addLine(`whiskersearch@system ~ % ${value}`, "cmd");

  const args = value.split(" ");
  const main = args[0];

  switch(main){

    case "about":
      addLine("WhiskerSearch-ProfessorCat is an interactive web experience.");
      addLine("It simulates a browser-like system and guides the user through a 4-stage journey.");
      break;

    case "contact":
      addLine("result:");
      addLine("https://ayse-create.github.io/WhiskerSearch/contact");
      break;

    case "feedback":
      addLine("result:");
      addLine("Google Apps Script endpoint loaded");
      addLine("https://script.google.com/macros/s/AKfycbzhq4K6qHQ0xoLVbNvKq_NWif8znBEcIki8z8wxozlQBAB3TjUGiREwU4GrBOe31cL6PA/exec");
      break;

    case "support":
      addLine("You can search \"whiskersearch-profcat\" on Google");
      addLine("and leave a review on the listed profile.");
      break;

    case "website":
      addLine("result:");
      addLine("https://ayse-create.github.io/WhiskerSearch/");
      break;

    case "help":
      addLine("commands: about, contact, feedback, support, website, clear");
      break;

    case "clear":
      output.innerHTML = "";
      break;

    default:
      if(value){
        addLine("command not found: " + main);
      }
  }

  cmd.value = "";
});
</script>

</body>
</html>
