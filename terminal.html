<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WhiskerTerminal🌐</title>
<link rel="icon" type="image/png" href="apple-touch-icon.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #eaeaea;
  font-family: "SF Mono","Menlo","Monaco","Consolas",monospace;
  font-size: 13px;
  line-height: 1.05;
}

.terminal {
  padding: 12px;
  box-sizing: border-box;
}

.line {
  margin: 0;
  padding: 0;
  white-space: pre-wrap;
}

.prompt-text {
  color: #7CFF7C;
}

.command-text {
  color: #ffd54a;
}

a {
  color: #7aa2ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.prompt {
  display: flex;
  gap: 6px;
  align-items: center;
}

.prompt span {
  color: #7CFF7C;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #eaeaea;
  font: inherit;
}
</style>
</head>

<body>

<div class="terminal">

  <div class="line">WhiskerSearch Terminal v1.0</div>

  <div id="output"></div>

  <div class="prompt">
    <span>whiskersearch@system ~ %</span>
    <input id="cmd" autofocus />
  </div>

</div>

<script>
const cmd = document.getElementById("cmd");
const output = document.getElementById("output");

let lang = "en";
let lastCommand = "";

function linkify(text){
  return text.replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank">$1</a>'
  );
}

function addLine(text){
  const div = document.createElement("div");
  div.className = "line";
  div.innerHTML = linkify(text);
  output.appendChild(div);

  window.scrollTo(0, document.body.scrollHeight);
}

function addCommandLine(command){
  const div = document.createElement("div");
  div.className = "line";

  div.innerHTML =
    '<span class="prompt-text">whiskersearch@system ~ %</span> ' +
    '<span class="command-text">' +
    command.replace(/</g,"&lt;").replace(/>/g,"&gt;") +
    '</span>';

  output.appendChild(div);

  window.scrollTo(0, document.body.scrollHeight);
}

function run(cmdText, saveCommand = true){

  const args = cmdText.split(" ");
  const main = args[0];

  if(saveCommand && !["TR","ENG"].includes(main)){
    lastCommand = cmdText;
  }

  if(main === "TR"){
    lang = "tr";
    addLine("Dil algılandı: Türkçe");

    if(lastCommand){
      run(lastCommand, false);
    }
    return;
  }

  if(main === "ENG"){
    lang = "en";
    addLine("Language detected: English");

    if(lastCommand){
      run(lastCommand, false);
    }
    return;
  }

  switch(main){

    case "about":

      if(lang === "en"){
        addLine("WhiskerSearch-ProfessorCat is an interactive web experience.");
        addLine("It simulates a browser-like system and guides the user through a 4-stage journey.");
      } else {
        addLine("WhiskerSearch-ProfessorCat interaktif bir web deneyimidir.");
        addLine("Bir tarayıcı sistemi gibi çalışır ve kullanıcıyı 4 aşamalı bir yolculuğa yönlendirir.");
      }

      break;

    case "support":

      if(lang === "en"){
        addLine('You can search "whiskersearch-profcat" on Google');
        addLine("and leave a review on the listed profile.");
      } else {
        addLine('"whiskersearch-profcat" ifadesini Google\'da aratabilir');
        addLine("ve listelenen profil üzerinden değerlendirme bırakabilirsiniz.");
      }

      break;

    case "website":

      addLine(lang === "en" ? "result:" : "sonuç:");
      addLine("https://ayse-create.github.io/WhiskerSearch/");
      break;

    case "contact":

      addLine(lang === "en" ? "result:" : "sonuç:");
      addLine("https://ayse-create.github.io/WhiskerSearch/contact");
      break;

    case "feedback":

      if(lang === "en"){
        addLine("result:");
        addLine("Google Apps Script endpoint loaded");
      } else {
        addLine("sonuç:");
        addLine("Google Apps Script bağlantısı yüklendi");
      }

      addLine("https://script.google.com/macros/s/AKfycbzhq4K6qHQ0xoLVbNvKq_NWif8znBEcIki8z8wxozlQBAB3TjUGiREwU4GrBOe31cL6PA/exec");
      break;

    case "help":

      addLine("about");
      addLine("contact");
      addLine("feedback");
      addLine("support");
      addLine("website");
      addLine("TR");
      addLine("ENG");
      addLine("clear");

      break;

    case "clear":

      output.innerHTML = "";
      break;

    default:

      if(cmdText){
        addLine("command not found: " + main);
      }
  }
}

cmd.addEventListener("keydown", (e)=>{

  if(e.key !== "Enter") return;

  const value = cmd.value.trim();

  addCommandLine(value);

  run(value);

  cmd.value = "";
});
</script>

</body>
</html>
