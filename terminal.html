<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WhiskerTerminal</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  color: #eaeaea;
  font-family: "SF Mono","Menlo","Monaco","Consolas",monospace;
  font-size: 13px;
  line-height: 1.05;
}

.terminal {
  padding: 12px;
  box-sizing: border-box;
}

.line {
  margin: 0;
  padding: 0;
  white-space: pre-wrap;
}

.cmd {
  color: #ffd54a; /* sarı */
}

a {
  color: #7aa2ff;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.prompt {
  display: flex;
  gap: 6px;
  align-items: center;
}

.prompt span {
  color: #7CFF7C;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #eaeaea;
  font: inherit;
}
</style>
</head>

<body>

<div class="terminal">

  <div class="line">WhiskerSearch Terminal v1.0</div>

  <div id="output"></div>

  <div class="prompt">
    <span>whiskersearch@system ~ %</span>
    <input id="cmd" autofocus />
  </div>

</div>

<script>
const cmd = document.getElementById("cmd");
const output = document.getElementById("output");

let lang = "en"; // varsayılan

function addLine(text){
  const div = document.createElement("div");
  div.className = "line";
  div.innerHTML = text;
  output.appendChild(div);
}

function run(cmdText){
  const args = cmdText.split(" ");
  const main = args[0];

  // DİL KOMUTLARI
  if(main === "TR"){
    lang = "tr";
    addLine("Dil Türkçe olarak ayarlandı.");
    return;
  }

  if(main === "ENG"){
    lang = "en";
    addLine("Language set to English.");
    return;
  }

  // KOMUTLAR
  switch(main){

    case "about":
      if(lang === "en"){
        addLine("WhiskerSearch-ProfessorCat is an interactive web experience.");
        addLine("It simulates a browser-like system and guides the user through a 4-stage journey.");
      } else {
        addLine("WhiskerSearch-ProfessorCat interaktif bir web deneyimidir.");
        addLine("Bir tarayıcı sistemi gibi çalışır ve kullanıcıyı 4 aşamalı bir yolculuğa yönlendirir.");
      }
      break;

    case "support":
      if(lang === "en"){
        addLine("Search \"whiskersearch-profcat\" on Google and leave a review.");
      } else {
        addLine("\"whiskersearch-profcat\" diye Google'da aratıp yorum bırakabilirsin.");
      }
      break;

    case "website":
      addLine("https://ayse-create.github.io/WhiskerSearch/");
      break;

    case "contact":
      addLine("https://ayse-create.github.io/WhiskerSearch/contact");
      break;

    default:
      if(cmdText){
        addLine("command not found: " + main);
      }
  }
}

cmd.addEventListener("keydown", (e)=>{
  if(e.key !== "Enter") return;

  const value = cmd.value.trim();
  addLine(`ws@system ~ % ${value}`);

  run(value);

  cmd.value = "";
});
</script>
