<div id="ai-content" class="tab-content">

  <div class="ai-chat-container" style="display:flex;flex-direction:column;height:100%;">

    <!-- MESAJ ALANI -->
    <div id="aiMessages" style="
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    ">
      <div style="text-align:center;color:#666;margin-top:40px;">
        🤖 Whisker AI sohbet modunda
      </div>
    </div>

    <!-- INPUT -->
    <div style="display:flex;gap:10px;border-top:1px solid #ddd;padding:10px;">

      <input id="aiInput"
        type="text"
        placeholder="Bir şey anlat..."
        style="flex:1;height:44px;padding:0 12px;border:1px solid #ccc;border-radius:10px;outline:none;"
      />

      <button id="sendBtn"
        style="height:44px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;">
        Gönder
      </button>

    </div>

  </div>

</div>

<!-- STİL -->
<style>
.message{display:flex;}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>

<!-- AI ENGINE -->
<script type="module">
(function(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");
  const btn = document.getElementById("sendBtn");

  if(!input || !chat || !btn) return;

  let engine = null;

  function addMessage(text, type){

    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = `<div class="message-bubble"></div>`;
    div.querySelector(".message-bubble").textContent = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div.querySelector(".message-bubble");
  }

  async function initAI(){
    const loading = addMessage("Model yükleniyor...", "ai");

    const webllm = await import("https://esm.run/@mlc-ai/web-llm");

    engine = await webllm.CreateMLCEngine(
      "Llama-3.2-1B-Instruct-q4f32_1"
    );

    loading.textContent = "Hazır 😺";
  }

  async function send(){

    const text = input.value.trim();
    if(!text || !engine) return;

    addMessage(text, "user");
    input.value = "";

    const bubble = addMessage("...", "ai");

    const res = await engine.chat.completions.create({
      messages: [
        {
  role: "system",
  content: `
Sen ProfCat adlı bir asistansın.

Kurallar:
- Kısa ve doğal cevap ver (3-5 cümle)
- Türkçe konuş
- Kullanıcı "teşekkür", "tamam", "evet", "hayır" gibi kısa ifadeler yazarsa:
  - uygun kısa sosyal cevap ver
- Anlamadığın şeylerde "Bunu tam anlayamadım" deme, onun yerine soru sor
- Matematik sorularını her zaman çöz
- Asla cevapsız bırakma
`
}
        { role: "user", content: text }
      ]
    });

    bubble.textContent = res.choices[0].message.content;

  }

  btn.addEventListener("click", send);

  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){
      e.preventDefault();
      send();
    }
  });

  initAI();

})();
</script>
