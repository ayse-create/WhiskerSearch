<div id="ai-content" class="tab-content">

  <div class="ai-chat-container" style="display:flex;flex-direction:column;height:100%;">

    <!-- MESAJ ALANI -->
    <div id="aiMessages" style="
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    ">
      <div style="text-align:center;color:#666;margin-top:40px;">
        🤖 Whisker AI sohbet modunda
      </div>
    </div>

    <!-- INPUT -->
    <div style="display:flex;gap:10px;border-top:1px solid #ddd;padding:10px;">

      <input id="aiInput"
        type="text"
        placeholder="Bir şey anlat..."
        style="flex:1;height:44px;padding:0 12px;border:1px solid #ccc;border-radius:10px;outline:none;"
      />

      <button id="sendBtn"
        style="height:44px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;">
        Gönder
      </button>

    </div>

  </div>

</div>

<!-- STİL -->
<style>
.message{display:flex;}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>

<!-- AI ENGINE -->
<script>
(function(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");
  const btn = document.getElementById("sendBtn");

  if(!input || !chat || !btn) return;

  function reply(text){

    const t = text.trim().toLowerCase();

    // 🧮 HESAP MAKİNESİ
    if(/^[0-9+\-*/().\s^]+$/.test(text)){
      try {
        const result = Function("return (" + text.replace(/\^/g,"**") + ")")();
        return "🧮 Sonuç: " + result;
      } catch {
        return "Bunu hesaplayamadım 😺";
      }
    }

    // 👋 SELAM
    if(t.includes("merhaba") || t.includes("selam")){
      const r = [
        "Selam 😺 bugün neler yapıyorsun?",
        "Merhaba! Günün nasıl geçiyor?",
        "Hey 😸 anlat bakalım",
        "Selam 🐾 bir şey oldu mu bugün?"
      ];
      return r[Math.floor(Math.random()*r.length)];
    }

    // 🏫 OKUL / GÜN SOHBET
    if(t.includes("okul") || t.includes("ders") || t.includes("bugün")){
      const r = [
        "Okul nasıldı 😺?",
        "Bugün ilginç bir şey oldu mu?",
        "En sevdiğin ders hangisi?",
        "Yorucu bir gün müydü 🐾?",
        "Anlat bakalım, dinliyorum 😸"
      ];
      return r[Math.floor(Math.random()*r.length)];
    }

    // 😄 OLUMLU DUYGU
    if(t.includes("iyi") || t.includes("güzel") || t.includes("harika") || t.includes("süper")){
      const r = [
        "Hmm güzelmiş 😺 devam et",
        "İlginç 😸 sonra ne oldu?",
        "Bunu duymak iyi 🐾",
        "Güzel gidiyor gibi, anlat bakalım",
        "Hoş 😺 biraz daha detay verir misin?"
      ];
      return r[Math.floor(Math.random()*r.length)];
    }

    // 😐 BİLMİYORUM
    if(t.includes("bilmiyorum") || t.includes("emin değilim")){
      const r = [
        "Sorun değil 😺 birlikte düşünebiliriz",
        "Bilmemen normal 🐾",
        "İstersen birlikte bulalım",
        "Önemli değil, devam edelim 😸"
      ];
      return r[Math.floor(Math.random()*r.length)];
    }

    // 🎤 UZUN CÜMLELER = SOHBET DEVAM
    if(text.length > 20){
      const r = [
        "Vay 😺 sonra ne oldu?",
        "İlginçmiş 🐾 devam et",
        "Bunu merak ettim 😸",
        "Anladım gibi ama biraz daha anlat",
        "Dinliyorum 😺 devam et"
      ];
      return r[Math.floor(Math.random()*r.length)];
    }

    // 🐱 WHISKER
    if(t.includes("whisker")){
      return "WhiskerSearch kedi temalı bir demo arama motorudur 😺";
    }

    // 💬 GENEL SOHBET AKIŞI
    const fallback = [
      "Hmm 😺 biraz daha anlatır mısın?",
      "Devam et, dinliyorum 🐾",
      "Bunu tam anlayamadım ama ilgimi çekti",
      "Sonra ne oldu 😸?",
      "Biraz daha detay verir misin?",
      "İlginç 😺"
    ];

    return fallback[Math.floor(Math.random()*fallback.length)];
  }

  function send(){

    const text = input.value.trim();
    if(!text) return;

    // USER
    const u = document.createElement("div");
    u.className = "message user";
    u.innerHTML = `<div class="message-bubble">${text}</div>`;
    chat.appendChild(u);

    input.value = "";

    // AI
    setTimeout(() => {

      const r = reply(text);

      const a = document.createElement("div");
      a.className = "message ai";
      a.innerHTML = `<div class="message-bubble">${r}</div>`;
      chat.appendChild(a);

      chat.scrollTop = chat.scrollHeight;

    }, 200);

  }

  btn.addEventListener("click", send);

  input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      send();
    }
  });

})();
</script>
