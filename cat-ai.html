<div id="ai-content" class="tab-content">

  <div class="ai-chat-container" style="display:flex;flex-direction:column;height:100%;">

    <!-- MESAJ ALANI -->
    <div id="aiMessages" style="
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    ">
      <div style="text-align:center;color:#666;margin-top:40px;">
        🤖 Whisker AI sohbet modunda
      </div>
    </div>

    <!-- INPUT -->
    <div style="display:flex;gap:10px;border-top:1px solid #ddd;padding:10px;">

      <input id="aiInput"
        type="text"
        placeholder="Bir şey anlat..."
        style="flex:1;height:44px;padding:0 12px;border:1px solid #ccc;border-radius:10px;outline:none;"
      />

      <button id="sendBtn"
        style="height:44px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;">
        Gönder
      </button>

    </div>

  </div>

</div>

<style>
.message{display:flex;}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  word-wrap:break-word;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}

.typing{
  font-size:12px;
  color:#888;
  margin-left:10px;
}
</style>

<script>
(function(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");
  const btn = document.getElementById("sendBtn");

  if(!input || !chat || !btn) return;

  // 🔌 BURAYA SONRA WEBLLM BAĞLANACAK
  let engine = null;

  function addMessage(text, type){

    const div = document.createElement("div");
    div.className = "message " + type;

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.textContent = text;

    div.appendChild(bubble);
    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

    return bubble;
  }

  function localReply(text){

    const t = text.toLowerCase();

    if(/^[0-9+\-*/().\s^]+$/.test(text)){
      try {
        return "🧮 Sonuç: " + Function("return (" + text.replace(/\^/g,"**") + ")")();
      } catch {
        return "Hesaplayamadım 😺";
      }
    }

    if(t.includes("merhaba") || t.includes("selam"))
      return "Selam 😺";

    if(t.includes("okul") || t.includes("ders"))
      return "Okul nasıl gidiyor? 😸";

    if(t.includes("whisker"))
      return "WhiskerSearch bir kedi temalı demo arama motoru 😺";

    return "Bunu tam anlayamadım ama anlatabilirsin 😺";
  }

  async function getAIResponse(text){

    // 🤖 Eğer WebLLM bağlarsan burası aktif olur
    if(engine){
      const res = await engine.chat.completions.create({
        messages: [
          { role: "system", content: "Sen ProfCat adında basit bir asistansın." },
          { role: "user", content: text }
        ]
      });

      return res.choices[0].message.content;
    }

    // fallback
    return localReply(text);
  }

  async function send(){

    const text = input.value.trim();
    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    const typing = addMessage("yazıyor...", "ai");

    const reply = await getAIResponse(text);

    typing.textContent = reply;

  }

  btn.addEventListener("click", send);

  input.addEventListener("keydown", (e)=>{
    if(e.key === "Enter") send();
  });

})();
</script>
