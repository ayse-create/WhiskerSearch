<div id="ai-content" class="tab-content">

  <div style="display:flex;flex-direction:column;height:100%;">

    <!-- MESAJLAR -->
    <div id="aiMessages" style="flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;">
      <div style="text-align:center;color:#666;margin-top:40px;">
        🤖 Whisker AI başlatılıyor...
      </div>
    </div>

    <!-- INPUT -->
    <div style="display:flex;gap:10px;border-top:1px solid #ddd;padding:10px;">
      <input id="aiInput" type="text" placeholder="Bir şey yaz..."
        style="flex:1;height:44px;padding:0 12px;border:1px solid #ccc;border-radius:10px;outline:none;" />

      <button id="sendBtn"
        style="height:44px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;">
        Gönder
      </button>
    </div>

  </div>
</div>

<style>
.message{display:flex;}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}
.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}
.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>

<script type="module">
import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm";

const input = document.getElementById("aiInput");
const chat = document.getElementById("aiMessages");
const btn = document.getElementById("sendBtn");

let engine = null;

/* mesaj ekleme */
function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "message-bubble";
  bubble.textContent = text;

  div.appendChild(bubble);
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

/* model başlat */
async function initAI(){
  const loading = addMessage("Model yükleniyor...", "ai");

  try {
    console.log("WebGPU:", navigator.gpu);

    const models = webllm.prebuiltAppConfig.model_list;
    console.log("Models:", models);

    const model = models[0].model_id; // otomatik en uyumlu model

    engine = await webllm.CreateMLCEngine(model);

    loading.textContent = "Hazır 😺";

  } catch (e) {
    console.error("INIT ERROR:", e);
    loading.textContent = "Model yüklenemedi ❌";
  }
}

/* mesaj gönder */
async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  if(!engine){
    addMessage("Model henüz hazır değil 😺", "ai");
    return;
  }

  const bubble = addMessage("...", "ai");

  try {
    const res = await engine.chat.completions.create({
      messages: [
        {
          role: "system",
          content: "Answer briefly, naturally, and in English.Do not agree with incorrect user statements. If the user is wrong, correct them clearly and politely. Do not follow the user's false claims.Always prioritize factual correctness over user agreement."
        },
        {
          role: "user",
          content: text
        }
      ]
    });

    bubble.textContent = res.choices[0].message.content;

  } catch (e) {
    console.error(e);
    bubble.textContent = "AI hata verdi ❌";
  }
}

/* eventler */
btn.addEventListener("click", send);

input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

/* başlat */
initAI();
</script>
