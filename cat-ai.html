<div id="ai-content" class="tab-content">

  <div class="ai-chat-container" style="display:flex;flex-direction:column;height:100%;">

    <!-- MESAJ ALANI -->
    <div id="aiMessages" style="
      flex:1;
      overflow-y:auto;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    ">
      <div style="text-align:center;color:#666;margin-top:40px;">
        🤖 Whisker AI sohbet modunda
      </div>
    </div>

    <!-- INPUT -->
    <div style="display:flex;gap:10px;border-top:1px solid #ddd;padding:10px;">

      <input id="aiInput"
        type="text"
        placeholder="Bir şey anlat..."
        style="flex:1;height:44px;padding:0 12px;border:1px solid #ccc;border-radius:10px;outline:none;"
      />

      <button id="sendBtn"
        style="height:44px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;">
        Gönder
      </button>

    </div>

  </div>

</div>

<!-- STİL -->
<style>
.message{display:flex;}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>

<!-- AI ENGINE -->
<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const input = document.getElementById("aiInput");
const chat = document.getElementById("aiMessages");
const btn = document.getElementById("sendBtn");

let engine = null;

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "message-bubble";
  bubble.textContent = text;

  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

async function initAI(){
  const loading = addMessage("Model yükleniyor...", "ai");

  try {
    console.log("WebGPU:", navigator.gpu);

    engine = await webllm.CreateMLCEngine(
      "Phi-3-mini-4k-instruct-q4f16_1"
    );

    loading.textContent = "Hazır 😺";

  } catch (e) {
    console.error("MODEL ERROR:", e);
    loading.textContent = "Model yüklenemedi ❌ (Console bak)";
  }
}

async function send(){

  const text = input.value.trim();
  if(!text){
    console.log("boş mesaj");
    return;
  }

  addMessage(text, "user");
  input.value = "";

  if(!engine){
    addMessage("Model hazır değil 😺 (init bekleniyor)", "ai");
    console.log("engine null");
    return;
  }

  const bubble = addMessage("...", "ai");

  try {
    const res = await engine.chat.completions.create({
      messages: [
        { role: "system", content: "Kısa ve doğal cevap ver." },
        { role: "user", content: text }
      ]
    });

    bubble.textContent = res.choices[0].message.content;

  } catch (e) {
    console.error(e);
    bubble.textContent = "AI hata verdi ❌";
  }
}

btn.addEventListener("click", send);

input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});

initAI();
</script>
