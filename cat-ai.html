
<div id="ai-content" class="tab-content">

  <div class="ai-chat-container">

    <!-- MESAJ ALANI -->
    <div class="ai-messages" id="aiMessages">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:20px;">
        <div style="font-size:80px;">🤖</div>
        <div style="font-size:32px;font-weight:700;color:#333;">CatAI</div>
        <div style="font-size:16px;color:#666;max-width:400px;text-align:center;">
          ProfessorCat’ın yapay zeka asistanı ile sohbet edin. Bir soru sorun ve hazır olun!
        </div>
      </div>
    </div>

    <!-- INPUT + GÖNDER (BİRLEŞİK) -->
    <div class="ai-input-area" style="
      display:flex;
      align-items:stretch;
      gap:10px;
      border-top:1px solid #e0e0e0;
      padding-top:15px;
    ">

      <input
        type="text"
        id="aiInput"
        placeholder="Bir soru sor..."
        onkeypress="handleAIMessage(event)"
        style="
          flex:1;
          height:46px;
          padding:0 14px;
          border:1px solid #ddd;
          border-radius:10px;
          font-size:14px;
          outline:none;
          box-sizing:border-box;
        "
      >

      <button
        onclick="sendAIMessage()"
        style="
          height:46px;
          padding:0 20px;
          border:none;
          border-radius:10px;
          background:linear-gradient(135deg,#667eea,#764ba2);
          color:white;
          font-weight:600;
          cursor:pointer;
          display:flex;
          align-items:center;
          justify-content:center;
          white-space:nowrap;
        "
      >
        Gönder
      </button>

    </div>

  </div>

</div>
<script>
window.sendAIMessage = function(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");

  if(!input || !chat) return;

  const text = input.value.trim();
  if(!text) return;

  // kullanıcı mesajı
  const user = document.createElement("div");
  user.className = "message user";
  user.innerHTML = `<div class="message-bubble">${text}</div>`;
  chat.appendChild(user);

  input.value = "";

  // bot mesajı
  setTimeout(() => {
    const ai = document.createElement("div");
    ai.className = "message ai";
    ai.innerHTML = `<div class="message-bubble">Bunu şu an işleyemiyorum 🤖</div>`;
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;
  }, 400);

};

// ENTER FIX (inline bozulsa bile çalışsın diye)
document.addEventListener("keydown", function(e){
  const input = document.getElementById("aiInput");
  if(!input) return;

  if(e.key === "Enter" && document.activeElement === input){
    e.preventDefault();
    window.sendAIMessage();
  }
});
</script>
<script>
(function(){

  function get(){
    return {
      input: document.getElementById("aiInput"),
      chat: document.getElementById("aiMessages")
    };
  }

  function send(){
    const {input, chat} = get();
    if(!input || !chat) return;

    const text = input.value.trim();
    if(!text) return;

    const user = document.createElement("div");
    user.className = "message user";
    user.innerHTML = `<div class="message-bubble">${text}</div>`;
    chat.appendChild(user);

    input.value = "";

    setTimeout(() => {
      const ai = document.createElement("div");
      ai.className = "message ai";
      ai.innerHTML = `<div class="message-bubble">Çalışıyor 👍</div>`;
      chat.appendChild(ai);
      chat.scrollTop = chat.scrollHeight;
    }, 300);
  }

  // 🔥 KRİTİK: global'e zorla bağla
  window.sendAIMessage = send;

  // 🔥 ENTER garanti fix
  document.addEventListener("keydown", function(e){
    const {input} = get();
    if(!input) return;

    if(document.activeElement === input && e.key === "Enter"){
      e.preventDefault();
      send();
    }
  });

  // 🔥 onclick bozulursa bile yakalasın
  document.addEventListener("click", function(e){
    if(e.target && e.target.getAttribute("onclick") === "sendAIMessage()"){
      send();
    }
  });

})();
</script>
<style>
#aiMessages{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message.user{
  justify-content:flex-end;
  display:flex;
}

.message.ai{
  justify-content:flex-start;
  display:flex;
}

.message-bubble{
  padding:10px 14px;
  border-radius:12px;
  max-width:70%;
  font-size:14px;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>
<script>
let memory = JSON.parse(localStorage.getItem("ws_memory") || "{}");

function save(){
  localStorage.setItem("ws_memory", JSON.stringify(memory));
}

function getAnswer(text){
  const t = text.toLowerCase();

  // WhiskerSearch bilgisi
  if(t.includes("whisker")){
    return "WhiskerSearch, kedi temalı bir demo arama motoru ve sahte tarayıcı projesidir.";
  }

  // basit hafıza
  if(memory[t]){
    return memory[t];
  }

  // genel cevap
  let answer = "Bu konuda bilgim sınırlı 😺 ama WhiskerSearch içinde arama yapabilirsin.";

  memory[t] = answer;
  save();

  return answer;
}

function sendAIMessage(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");

  if(!input || !chat) return;

  const text = input.value.trim();
  if(!text) return;

  // USER MESSAGE
  const user = document.createElement("div");
  user.className = "message user";
  user.innerHTML = `<div class="message-bubble">${text}</div>`;
  chat.appendChild(user);

  input.value = "";

  // AI MESSAGE
  setTimeout(() => {

    const reply = getAnswer(text);

    const ai = document.createElement("div");
    ai.className = "message ai";
    ai.innerHTML = `<div class="message-bubble">${reply}</div>`;
    chat.appendChild(ai);

    chat.scrollTop = chat.scrollHeight;

  }, 300);

}

// ENTER desteği
document.addEventListener("keydown", function(e){
  const input = document.getElementById("aiInput");
  if(!input) return;

  if(document.activeElement === input && e.key === "Enter"){
    e.preventDefault();
    sendAIMessage();
  }
});
</script>
