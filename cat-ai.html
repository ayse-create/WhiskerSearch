<div id="ai-content" class="tab-content">

  <div class="ai-chat-container">

    <!-- MESAJ ALANI -->
    <div class="ai-messages" id="aiMessages">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:20px;">
        <div style="font-size:80px;">🤖</div>
        <div style="font-size:32px;font-weight:700;color:#333;">CatAI</div>
        <div style="font-size:16px;color:#666;max-width:400px;text-align:center;">
          ProfessorCat’ın yapay zeka asistanı ile sohbet edin. Bir soru sorun ve hazır olun!
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="ai-input-area" style="display:flex;gap:10px;border-top:1px solid #e0e0e0;padding-top:15px;">

      <input
        id="aiInput"
        type="text"
        placeholder="Bir soru sor..."
        style="flex:1;height:46px;padding:0 14px;border:1px solid #ddd;border-radius:10px;outline:none;"
      />

      <button
        id="sendBtn"
        style="height:46px;padding:0 20px;border:none;border-radius:10px;
        background:linear-gradient(135deg,#667eea,#764ba2);
        color:white;font-weight:600;cursor:pointer;"
      >
        Gönder
      </button>

    </div>

  </div>

</div>

<!-- STİL -->
<style>
#aiMessages{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.message{
  display:flex;
}

.message.user{
  justify-content:flex-end;
}

.message.ai{
  justify-content:flex-start;
}

.message-bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.message.user .message-bubble{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

.message.ai .message-bubble{
  background:#eee;
  color:#333;
}
</style>

<!-- AI ENGINE -->
<script>
(function(){

  const input = document.getElementById("aiInput");
  const chat = document.getElementById("aiMessages");
  const btn = document.getElementById("sendBtn");

  if(!input || !chat || !btn) return;

  let memory = JSON.parse(localStorage.getItem("ws_memory") || "{}");

  function save(){
    localStorage.setItem("ws_memory", JSON.stringify(memory));
  }

  function brain(text){

    const t = text.toLowerCase();

    if(t.includes("whisker")){
      return "WhiskerSearch kedi temalı bir demo arama motorudur 😺";
    }

    if(t.includes("merhaba") || t.includes("selam")){
      return "Merhaba 😺 nasıl yardımcı olabilirim?";
    }

    if(memory[t]){
      return memory[t];
    }

    const answer = "Bunu tam anlayamadım 😺 ama WhiskerSearch içinde arama yapabilirsin.";
    memory[t] = answer;
    save();

    return answer;
  }

  function send(){

    const text = input.value.trim();
    if(!text) return;

    const user = document.createElement("div");
    user.className = "message user";
    user.innerHTML = `<div class="message-bubble">${text}</div>`;
    chat.appendChild(user);

    input.value = "";

    setTimeout(() => {

      const reply = brain(text);

      const ai = document.createElement("div");
      ai.className = "message ai";
      ai.innerHTML = `<div class="message-bubble">${reply}</div>`;
      chat.appendChild(ai);

      chat.scrollTop = chat.scrollHeight;

    }, 250);

  }

  btn.addEventListener("click", send);

  input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      send();
    }
  });

})();
</script>
