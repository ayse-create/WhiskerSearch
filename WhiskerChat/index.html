<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhiskerChat 🐱</title>
    <style>
        /* ---------- GENEL ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Ana sohbet kutusu */
        .chat-container {
            width: 420px;
            max-width: 98%;
            height: 700px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---------- BAŞLIK (GRADIENT) ---------- */
        .chat-header {
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            padding: 20px 25px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .chat-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2d2d2d;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.3);
        }

        .chat-header h1 span {
            font-size: 28px;
        }

        /* ---------- MESAJ ALANI ---------- */
        .chat-messages {
            flex: 1;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f0f0f0;
        }

        /* ---------- MESAJ BALONLARI (Renk Döngüsü) ---------- */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        /* Kullanıcı mesajları sağda */
        .message.user {
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        /* Admin mesajları solda */
        .message.admin {
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        /* Renk sınıfları (döngü için) */
        .color-blue {
            background: #a8d8ff;
            color: #003366;
        }
        .color-purple {
            background: #d5b8ff;
            color: #2d1b4e;
        }
        .color-pink {
            background: #ffb8d8;
            color: #5e2a44;
        }

        /* Mesaj animasyonu */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- ALT GİRİŞ ALANI ---------- */
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        /* Yumuşacık input */
        .chat-input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #ccc;
            border-radius: 50px; /* Çok yumuşak */
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        /* Tıklayınca gradient çerçeve */
        .chat-input-area input:focus {
            border-color: transparent;
            background: white;
            box-shadow: 0 0 0 3px #CFEFFF, 0 0 0 6px #D8C7FF, 0 0 0 9px #FFD1E8;
            /* Gradient efekti için box-shadow katmanları */
        }

        /* Gönder butonu (gradient + ok) */
        .chat-input-area button {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            color: #2d2d2d;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
        }

        .chat-input-area button:active {
            transform: scale(0.92);
        }

        /* Yukarı bakan ok */
        .chat-input-area button::after {
            content: "↑";
            font-size: 28px;
            line-height: 1;
            color: #1a1a2e;
        }

        /* ---------- SCROLLBAR SÜSLEMESİ ---------- */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e8e8e8;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #d0b0ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- BAŞLIK -->
        <div class="chat-header">
            <h1>🐱 WhiskerChat</h1>
        </div>

        <!-- MESAJLAR -->
        <div class="chat-messages" id="messageArea">
            <!-- Örnek mesajlar (renk döngüsüyle) -->
            <div class="message user color-blue">Merhaba!</div>
            <div class="message admin color-purple">Merhaba! Size nasıl yardımcı olabilirim?</div>
            <div class="message user color-pink">Kedim çok hasta, ne yapabilirim?</div>
            <div class="message admin color-blue">Kedinizin hastalık belirtileri neler?</div>
            <div class="message user color-purple">Sürekli hapşuruyor ve iştahı yok.</div>
            <div class="message admin color-pink">Kediniz üst solunum yolu enfeksiyonu geçiriyor olabilir. Bol su verin ve en kısa sürede veterinere görünün.</div>
        </div>

        <!-- ALT YAZMA ALANI -->
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." />
            <button id="sendButton"></button>
        </div>
    </div>

    <script>
        // ---------- MESAJ GÖNDERME ----------
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendButton');
        const messageArea = document.getElementById('messageArea');

        // Renk döngüsü için sayaç
        let colorIndex = 0;
        const colorClasses = ['color-blue', 'color-purple', 'color-pink'];

        // Yeni mesaj ekleme fonksiyonu
        function addMessage(text, sender) {
            if (!text.trim()) return;

            // Hangi renk sırada?
            const colorClass = colorClasses[colorIndex % colorClasses.length];
            colorIndex++; // Bir sonraki mesaj için ilerlet

            // Mesaj div'ini oluştur
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender} ${colorClass}`;
            msgDiv.textContent = text;

            // Mesaj alanına ekle ve aşağı kaydır
            messageArea.appendChild(msgDiv);
            messageArea.scrollTop = messageArea.scrollHeight;

            // ---- MİYAV SESİ (Her 10 mesajda bir) ----
            // Toplam mesaj sayısını kontrol et
            const totalMessages = messageArea.children.length;
            if (totalMessages % 10 === 0) {
                // Ses efekti oluştur (basit bir "miyav" sesi için Web Audio API)
                playMeowSound();
            }
        }

        // Basit "miyav" sesi (Web Audio API ile)
        function playMeowSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // Miyav benzeri bir ses (iki farklı frekans)
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);

                oscillator.type = 'sawtooth'; // Biraz kedi sesi gibi
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {
                // Ses çalışmazsa sessizce geç
                console.log('Miyav sesi çalınamadı :)');
            }
        }

        // Gönder butonuna tıklayınca
        sendBtn.addEventListener('click', function () {
            const text = input.value.trim();
            if (text) {
                addMessage(text, 'user');
                input.value = '';

                // Admin otomatik cevabı (örnek) - gerçekte buraya Google Sheets gelecek
                setTimeout(() => {
                    addMessage('Mesajınız alındı! 🐱', 'admin');
                }, 600);
            }
        });

        // Enter tuşu ile gönderme
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });

        // Sayfa açıldığında inputa odaklan
        window.addEventListener('load', () => {
            input.focus();
        });
    </script>
</body>
</html>
