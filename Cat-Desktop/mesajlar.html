<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐱 Mesajlar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        /* Ana içerik */
        .main {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Sol: Kişi listesi */
        .sidebar {
            width: 240px;
            background: #f8f9fc;
            border-right: 1px solid #e8e8ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #e8e8ed;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 8px;
            margin: 0 6px;
        }

        .contact-item:hover {
            background: #f0f0f5;
        }

        .contact-item.active {
            background: #e8e8f0;
        }

        .contact-item .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .contact-item .info {
            flex: 1;
            min-width: 0;
        }

        .contact-item .info .name {
            font-weight: 600;
            font-size: 14px;
            color: #1c1c1e;
        }

        .contact-item .info .preview {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sağ: Sohbet */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .chat-header .ch-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .chat-header .ch-name {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
        }

        .chat-header .ch-status {
            font-size: 12px;
            color: #888;
            margin-left: 4px;
        }

        /* Mesajlar */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #faf9fc;
        }

        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            color: #1c1c1e;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #f0f0f0;
            color: #1c1c1e;
            border-bottom-left-radius: 4px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid #e8e8ed;
            background: #ffffff;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1.5px solid #e8e8ed;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8f9fc;
            transition: all 0.2s;
            min-width: 0;
        }

        .input-area input:focus {
            border-color: #D8C7FF;
            background: white;
            box-shadow: 0 0 0 4px rgba(216, 199, 255, 0.15);
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            font-size: 20px;
            cursor: pointer;
            color: #1c1c1e;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(216, 199, 255, 0.3);
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .empty-state .big-icon { font-size: 48px; }

        .messages::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb {
            background: #d0d0d5;
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 180px;
            }
        }
    </style>
</head>
<body>

<div class="window">
    <div class="main">
        <!-- Sol Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">Kişiler</div>
            <div class="contact-list" id="contactList">
                <div class="contact-item active" data-contact="888">
                    <div class="avatar">🐾</div>
                    <div class="info">
                        <div class="name">+1 888 555-1212</div>
                        <div class="preview" id="preview888">Henüz mesaj yok</div>
                    </div>
                </div>
                <div class="contact-item" data-contact="555">
                    <div class="avatar">🐱</div>
                    <div class="info">
                        <div class="name">+1 555 564-8583</div>
                        <div class="preview" id="preview555">Henüz mesaj yok</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sağ Sohbet -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="ch-avatar" id="chatAvatar">🐱</div>
                <div>
                    <span class="ch-name" id="chatName">+1 888 555-1212</span>
                    <span class="ch-status" id="chatStatus">🟢 Çevrimiçi</span>
                </div>
            </div>

            <div class="messages" id="messageContainer">
                <div class="empty-state">
                    <div class="big-icon">💬</div>
                    <div>Henüz mesaj yok</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Mesaj yaz..." />
                <button id="sendButton">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    let messages = {
        '888': [],
        '555': []
    };

    let currentContact = '888';

    const contactList = document.getElementById('contactList');
    const messageContainer = document.getElementById('messageContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const chatName = document.getElementById('chatName');
    const chatAvatar = document.getElementById('chatAvatar');
    const chatStatus = document.getElementById('chatStatus');
    const preview888 = document.getElementById('preview888');
    const preview555 = document.getElementById('preview555');

    function getTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        return h + ':' + m;
    }

    function renderMessages(contact) {
        const msgs = messages[contact] || [];
        if (msgs.length === 0) {
            messageContainer.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">💬</div>
                    <div>Henüz mesaj yok</div>
                </div>
            `;
            return;
        }
        messageContainer.innerHTML = '';
        msgs.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message ' + (msg.sender === 'sent' ? 'sent' : 'received');
            div.innerHTML = msg.text + `<span class="time">${getTime()}</span>`;
            messageContainer.appendChild(div);
        });
        messageContainer.scrollTop = messageContainer.scrollHeight;
    }

    function updatePreviews() {
        const msgs888 = messages['888'] || [];
        const msgs555 = messages['555'] || [];
        preview888.textContent = msgs888.length > 0 ? msgs888[msgs888.length - 1].text : 'Henüz mesaj yok';
        preview555.textContent = msgs555.length > 0 ? msgs555[msgs555.length - 1].text : 'Henüz mesaj yok';
    }

    function switchContact(contact) {
        currentContact = contact;
        document.querySelectorAll('.contact-item').forEach(el => {
            el.classList.toggle('active', el.dataset.contact === contact);
        });
        const name = contact === '888' ? '+1 888 555-1212' : '+1 555 564-8583';
        const avatar = contact === '888' ? '🐾' : '🐱';
        chatName.textContent = name;
        chatAvatar.textContent = avatar;
        chatStatus.textContent = '🟢 Çevrimiçi';
        renderMessages(contact);
        messageInput.focus();
    }

    function addMessage(contact, text, sender) {
        if (!messages[contact]) messages[contact] = [];
        messages[contact].push({ text, sender });
        updatePreviews();
    }

    function sendMessage() {
        if (!currentContact) return;
        const text = messageInput.value.trim();
        if (text === '') return;

        addMessage(currentContact, text, 'sent');
        messageInput.value = '';

        const otherContact = currentContact === '888' ? '555' : '888';
        addMessage(otherContact, text, 'received');

        renderMessages(currentContact);
    }

    contactList.addEventListener('click', function(e) {
        const item = e.target.closest('.contact-item');
        if (item) switchContact(item.dataset.contact);
    });

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    switchContact('888');
</script>

</body>
</html>
