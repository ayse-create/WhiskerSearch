<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐱 Kişiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        /* Sol: Kişi listesi */
        .sidebar {
            width: 260px;
            min-width: 200px;
            background: #f8f9fc;
            border-right: 1px solid #e8e8ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 10px;
            margin: 0 6px;
        }

        .contact-item:hover {
            background: #f0f0f5;
        }

        .contact-item.active {
            background: #e8e8f0;
        }

        .contact-item .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .contact-item .info {
            flex: 1;
            min-width: 0;
        }

        .contact-item .info .name {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
        }

        .contact-item .info .detail {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sağ: Kişi kartı */
        .detail-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
            padding: 30px 36px;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }

        .profile-card {
            max-width: 400px;
            width: 100%;
            background: #faf9fc;
            border-radius: 24px;
            padding: 32px 28px;
            text-align: center;
            border: 1px solid #f0f0f5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .profile-card .big-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #CFEFFF, #D8C7FF, #FFD1E8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 16px;
        }

        .profile-card .p-name {
            font-size: 26px;
            font-weight: 700;
            color: #1c1c1e;
        }

        .profile-card .p-title {
            font-size: 15px;
            color: #888;
            margin-top: 4px;
        }

        .profile-card .p-detail {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 15px;
            color: #1c1c1e;
            border-bottom: 1px solid #f0f0f5;
            justify-content: center;
        }

        .profile-card .p-detail:last-child {
            border-bottom: none;
        }

        .profile-card .p-detail .icon {
            width: 24px;
            font-size: 18px;
            color: #888;
        }

        .profile-card .p-detail .value {
            flex: 1;
            text-align: left;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .empty-state .big-icon {
            font-size: 48px;
        }

        .contact-list::-webkit-scrollbar,
        .detail-area::-webkit-scrollbar {
            width: 4px;
        }
        .contact-list::-webkit-scrollbar-thumb,
        .detail-area::-webkit-scrollbar-thumb {
            background: #d0d0d5;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .sidebar {
                width: 180px;
                min-width: 140px;
            }
            .detail-area {
                padding: 20px 16px;
            }
            .profile-card {
                padding: 24px 16px;
            }
            .profile-card .big-avatar {
                width: 72px;
                height: 72px;
                font-size: 34px;
            }
            .profile-card .p-name {
                font-size: 22px;
            }
        }

        @media (max-width: 500px) {
            .sidebar {
                width: 130px;
                min-width: 100px;
            }
            .contact-item {
                padding: 8px 10px;
                gap: 8px;
            }
            .contact-item .avatar {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }
            .contact-item .info .name {
                font-size: 13px;
            }
            .contact-item .info .detail {
                font-size: 11px;
            }
            .profile-card .big-avatar {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            .profile-card .p-name {
                font-size: 18px;
            }
            .profile-card .p-detail {
                font-size: 13px;
                padding: 6px 0;
            }
        }
    </style>
</head>
<body>

<div class="window">
    <div class="main">
        <!-- Sol Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">🐾 Kişiler</div>
            <div class="contact-list" id="contactList">
                <!-- JS ile doldurulacak -->
            </div>
        </div>

        <!-- Sağ Detay -->
        <div class="detail-area" id="detailArea">
            <div class="empty-state">
                <div class="big-icon">🐱</div>
                <div>Bir kişi seçin</div>
            </div>
        </div>
    </div>
</div>

<script>
    // -------- VERİ --------
    const contacts = [{
        id: 0,
        name: 'Pamuk',
        emoji: '🐱',
        title: 'Baş Kedi',
        phone: '+1 555 000-1111',
        email: 'pamuk@kedi.com',
        job: 'Kedi İşleri Müdürü'
    }, {
        id: 1,
        name: 'Tarçın',
        emoji: '🐈',
        title: 'Kıdemli Kedi',
        phone: '+1 555 111-2222',
        email: 'tarcin@kedi.com',
        job: 'Strateji Kedisi'
    }, {
        id: 2,
        name: 'Badem',
        emoji: '🐾',
        title: 'Kedi Danışmanı',
        phone: '+1 555 222-3333',
        email: 'badem@kedi.com',
        job: 'Kıdemli Danışman'
    }, {
        id: 3,
        name: 'Zeytin',
        emoji: '😺',
        title: 'Kıdemli Kedi',
        phone: '+1 888 777-4444',
        email: 'zeytin@kedi.com',
        job: 'Pazarlama Kedisi'
    }, {
        id: 4,
        name: 'Karamel',
        emoji: '😻',
        title: 'Baş Kedi',
        phone: '+1 888 555-5555',
        email: 'karamel@kedi.com',
        job: 'İnovasyon Kedisi'
    }];

    // -------- DOM --------
    const contactList = document.getElementById('contactList');
    const detailArea = document.getElementById('detailArea');

    let selectedId = null;

    // -------- RENDER --------
    function renderContactList() {
        contactList.innerHTML = '';
        contacts.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = 'contact-item' + (index === 0 ? ' active' : '');
            div.dataset.id = c.id;
            div.innerHTML = `
                <div class="avatar">${c.emoji}</div>
                <div class="info">
                    <div class="name">${c.name}</div>
                    <div class="detail">${c.title}</div>
                </div>
            `;
            div.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                selectContact(id);
            });
            contactList.appendChild(div);
        });
    }

    function selectContact(id) {
        selectedId = id;
        const contact = contacts.find(c => c.id === id);
        if (!contact) return;

        // Aktif görünüm
        document.querySelectorAll('.contact-item').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.id) === id);
        });

        // Detay
        detailArea.innerHTML = `
            <div class="profile-card">
                <div class="big-avatar">${contact.emoji}</div>
                <div class="p-name">${contact.name}</div>
                <div class="p-title">${contact.title}</div>

                <div style="margin-top:20px; text-align:left;">
                    <div class="p-detail">
                        <span class="icon">💼</span>
                        <span class="value">${contact.job}</span>
                    </div>
                    <div class="p-detail">
                        <span class="icon">📞</span>
                        <span class="value">${contact.phone}</span>
                    </div>
                    <div class="p-detail">
                        <span class="icon">✉️</span>
                        <span class="value">${contact.email}</span>
                    </div>
                    <div class="p-detail">
                        <span class="icon">🐾</span>
                        <span class="value">${contact.title}</span>
                    </div>
                </div>
            </div>
        `;
    }

    // -------- BAŞLAT --------
    renderContactList();
    if (contacts.length > 0) {
        selectContact(contacts[0].id);
    }
</script>
</body>
</html>
