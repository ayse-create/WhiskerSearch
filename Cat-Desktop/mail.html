<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐱 Mail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f2f2f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window {
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .main {
            display: flex;
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        /* Sol: Klasörler */
        .sidebar {
            width: 200px;
            min-width: 160px;
            background: #f8f9fc;
            border-right: 1px solid #e8e8ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .folder-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .folder-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 8px;
            margin: 0 6px;
            font-size: 14px;
            color: #1c1c1e;
        }

        .folder-item:hover {
            background: #f0f0f5;
        }

        .folder-item.active {
            background: #e8e8f0;
            font-weight: 600;
        }

        .folder-item .badge {
            float: right;
            background: #D8C7FF;
            padding: 0 10px;
            border-radius: 30px;
            font-size: 12px;
            color: #1c1c1e;
        }

        /* Orta: Mail listesi */
        .mail-list {
            width: 340px;
            min-width: 240px;
            background: #ffffff;
            border-right: 1px solid #e8e8ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100%;
        }

        .mail-list-header {
            padding: 14px 18px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
            border-bottom: 1px solid #e8e8ed;
            flex-shrink: 0;
        }

        .mail-items {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .mail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-radius: 8px;
            margin: 0 6px;
            border-bottom: 1px solid #f5f5f7;
        }

        .mail-item:hover {
            background: #f0f0f5;
        }

        .mail-item.active {
            background: #e8e8f0;
        }

        .mail-item .m-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .mail-item .m-info {
            flex: 1;
            min-width: 0;
        }

        .mail-item .m-info .m-sender {
            font-weight: 600;
            font-size: 14px;
            color: #1c1c1e;
        }

        .mail-item .m-info .m-subject {
            font-size: 13px;
            color: #555;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item .m-info .m-preview {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item .m-date {
            font-size: 12px;
            color: #999;
            flex-shrink: 0;
        }

        /* Sağ: Mail içeriği */
        .mail-detail {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-width: 0;
            padding: 24px 30px;
            overflow-y: auto;
        }

        .mail-detail .md-header {
            border-bottom: 1px solid #f0f0f5;
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        .mail-detail .md-subject {
            font-size: 22px;
            font-weight: 700;
            color: #1c1c1e;
        }

        .mail-detail .md-sender {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .mail-detail .md-sender .md-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #D8C7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .mail-detail .md-sender .md-name {
            font-weight: 600;
            font-size: 15px;
            color: #1c1c1e;
        }

        .mail-detail .md-sender .md-email {
            font-size: 13px;
            color: #888;
        }

        .mail-detail .md-sender .md-date {
            margin-left: auto;
            font-size: 13px;
            color: #888;
        }

        .mail-detail .md-body {
            font-size: 15px;
            line-height: 1.6;
            color: #1c1c1e;
            flex: 1;
        }

        .mail-detail .md-body .attachment {
            display: inline-block;
            margin-top: 16px;
            padding: 8px 16px;
            background: #f0f0f5;
            border-radius: 30px;
            font-size: 14px;
            color: #555;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 8px;
            height: 100%;
        }

        .empty-state .big-icon {
            font-size: 48px;
        }

        .folder-list::-webkit-scrollbar,
        .mail-items::-webkit-scrollbar,
        .mail-detail::-webkit-scrollbar {
            width: 4px;
        }
        .folder-list::-webkit-scrollbar-thumb,
        .mail-items::-webkit-scrollbar-thumb,
        .mail-detail::-webkit-scrollbar-thumb {
            background: #d0d0d5;
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .mail-list {
                width: 240px;
                min-width: 160px;
            }
        }

        @media (max-width: 700px) {
            .sidebar {
                width: 140px;
                min-width: 100px;
            }
            .mail-list {
                width: 180px;
                min-width: 120px;
            }
            .mail-detail {
                padding: 16px;
            }
        }

        @media (max-width: 500px) {
            .sidebar {
                display: none;
            }
            .mail-list {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>

<div class="window">
    <div class="main">
        <!-- Sol: Klasörler -->
        <div class="sidebar">
            <div class="sidebar-header">📬 Klasörler</div>
            <div class="folder-list" id="folderList">
                <div class="folder-item active" data-folder="inbox">📥 Gelen Kutusu <span class="badge">5</span></div>
                <div class="folder-item" data-folder="sent">📤 Gönderilen</div>
                <div class="folder-item" data-folder="drafts">📝 Taslaklar</div>
                <div class="folder-item" data-folder="trash">🗑️ Çöp</div>
            </div>
        </div>

        <!-- Orta: Mail listesi -->
        <div class="mail-list" id="mailList">
            <div class="mail-list-header">📧 Gelen Kutusu</div>
            <div class="mail-items" id="mailItems">
                <!-- JS ile doldurulacak -->
            </div>
        </div>

        <!-- Sağ: Mail içeriği -->
        <div class="mail-detail" id="mailDetail">
            <div class="empty-state">
                <div class="big-icon">📧</div>
                <div>Bir mail seçin</div>
            </div>
        </div>
    </div>
</div>

<script>
    // -------- MAIL VERİSİ --------
    const mails = [{
        id: 0,
        folder: 'inbox',
        from: 'Zeytin',
        emoji: '😺',
        email: 'zeytin@kedi.com',
        subject: '📊 Pazarlama Raporu – Q1 2025',
        preview: 'Merhaba, Q1 pazarlama raporunu hazırladım. Ekte dosyayı bulabilirsin.',
        body: `Merhaba,<br><br>Q1 2025 pazarlama raporunu tamamladım. Tüm kampanyaların performansını detaylıca analiz ettim. Reklam harcamaları ve dönüşüm oranlarıyla ilgili önemli veriler var.<br><br>Ekte raporun PDF hali ve Excel verileri bulunuyor.<br><br>Sevgiler,<br><b>Zeytin</b> 😺<br><br><span class="attachment">📎 Pazarlama_Raporu_Q1_2025.pdf</span>`,
        date: 'Bugün 14:32'
    }, {
        id: 1,
        folder: 'inbox',
        from: 'Pamuk',
        emoji: '🐱',
        email: 'pamuk@kedi.com',
        subject: '🐾 Strateji Toplantısı – Yarın 10:00',
        preview: 'Yarınki strateji toplantısı için hazırlıkları tamamlayalım.',
        body: `Merhaba ekip,<br><br>Yarın saat 10:00'da strateji toplantımız var. Gündem maddelerini hazırladım. Lütfen toplantıdan önce dosyaları inceleyin.<br><br>Toplantı linki: <a href="#">https://zoom.kedi.com/strateji</a><br><br>Sevgiler,<br><b>Pamuk</b> 🐱`,
        date: 'Dün 09:15'
    }, {
        id: 2,
        folder: 'inbox',
        from: 'Tarçın',
        emoji: '🐈',
        email: 'tarcin@kedi.com',
        subject: '📈 Kedi Memnuniyet Anketi Sonuçları',
        preview: 'Kedi memnuniyet anketinin sonuçları geldi. Harika bir dönem geçirmişiz.',
        body: `Merhaba,<br><br>Kedi memnuniyet anketinin sonuçları açıklandı. Genel memnuniyet oranı %94 olarak ölçüldü. Bu harika bir başarı!<br><br>Detaylı raporu ekte bulabilirsin.<br><br>Sevgiler,<br><b>Tarçın</b> 🐈<br><br><span class="attachment">📎 Memnuniyet_Raporu_2025.pdf</span>`,
        date: 'Dün 11:40'
    }, {
        id: 3,
        folder: 'inbox',
        from: 'Badem',
        emoji: '🐾',
        email: 'badem@kedi.com',
        subject: '🧠 Yeni Kedi Projesi – Ön Değerlendirme',
        preview: 'Yeni proje için ön değerlendirme raporumu gönderiyorum. Görüşlerini bekliyorum.',
        body: `Merhaba,<br><br>Yeni kedi projesi için ön değerlendirme raporumu tamamladım. Projenin fizibilitesi ve potansiyel etkileri hakkında detaylı bir analiz hazırladım.<br><br>Görüşlerini ve önerilerini bekliyorum.<br><br>Sevgiler,<br><b>Badem</b> 🐾<br><br><span class="attachment">📎 Kedi_Projesi_On_Degerlendirme.pdf</span>`,
        date: '2 gün önce 16:20'
    }, {
        id: 4,
        folder: 'inbox',
        from: 'Karamel',
        emoji: '😻',
        email: 'karamel@kedi.com',
        subject: '🎨 Yeni Logo Tasarımı – Geri Bildirim',
        preview: 'Yeni logo tasarımını hazırladım. Geri bildirimlerini rica ediyorum.',
        body: `Merhaba,<br><br>Yeni logo tasarımı üzerinde çalıştım. İlham aldığım renk paleti ve fontlar hakkında detaylı notlar ekledim.<br><br>Geri bildirimlerini bekliyorum.<br><br>Sevgiler,<br><b>Karamel</b> 😻<br><br><span class="attachment">📎 Logo_Tasarimi_2025.pdf</span>`,
        date: '3 gün önce 10:05'
    }];

    // -------- DOM --------
    const folderList = document.getElementById('folderList');
    const mailItems = document.getElementById('mailItems');
    const mailDetail = document.getElementById('mailDetail');

    let currentFolder = 'inbox';
    let selectedMailId = null;

    // -------- RENDER --------
    function renderMailList(folder) {
        const filtered = mails.filter(m => m.folder === folder);
        if (filtered.length === 0) {
            mailItems.innerHTML = `
                <div style="padding:40px 20px; text-align:center; color:#999; font-size:14px;">
                    📭 Bu klasörde mail yok
                </div>
            `;
            return;
        }

        mailItems.innerHTML = '';
        filtered.forEach(m => {
            const div = document.createElement('div');
            div.className = 'mail-item' + (m.id === selectedMailId ? ' active' : '');
            div.dataset.id = m.id;
            div.innerHTML = `
                <div class="m-avatar">${m.emoji}</div>
                <div class="m-info">
                    <div class="m-sender">${m.from}</div>
                    <div class="m-subject">${m.subject}</div>
                    <div class="m-preview">${m.preview}</div>
                </div>
                <div class="m-date">${m.date}</div>
            `;
            div.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                selectMail(id);
            });
            mailItems.appendChild(div);
        });

        // Eğer seçili mail bu klasörde değilse ilk maili seç
        if (!mails.some(m => m.id === selectedMailId && m.folder === folder)) {
            if (filtered.length > 0) {
                selectMail(filtered[0].id);
            }
        }
    }

    function selectMail(id) {
        const mail = mails.find(m => m.id === id);
        if (!mail) return;
        selectedMailId = id;

        // Aktif görünüm
        document.querySelectorAll('.mail-item').forEach(el => {
            el.classList.toggle('active', parseInt(el.dataset.id) === id);
        });

        // Detay
        mailDetail.innerHTML = `
            <div class="md-header">
                <div class="md-subject">${mail.subject}</div>
                <div class="md-sender">
                    <div class="md-avatar">${mail.emoji}</div>
                    <div>
                        <div class="md-name">${mail.from}</div>
                        <div class="md-email">${mail.email}</div>
                    </div>
                    <div class="md-date">${mail.date}</div>
                </div>
            </div>
            <div class="md-body">${mail.body}</div>
        `;
    }

    function changeFolder(folder) {
        currentFolder = folder;
        document.querySelectorAll('.folder-item').forEach(el => {
            el.classList.toggle('active', el.dataset.folder === folder);
        });
        renderMailList(folder);
    }

    // -------- OLAYLAR --------
    folderList.addEventListener('click', function(e) {
        const item = e.target.closest('.folder-item');
        if (item) {
            changeFolder(item.dataset.folder);
        }
    });

    // -------- BAŞLAT --------
    renderMailList('inbox');
    if (mails.length > 0) {
        selectMail(mails[0].id);
    }
</script>
</body>
</html>
